  e.preventDefault();
  const btn=document.getElementById('login-btn'), err=document.getElementById('login-err');
  btn.textContent='Memuat...'; btn.disabled=true; err.classList.add('hidden');
  const {error} = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-pass').value
  });
  btn.textContent='Masuk'; btn.disabled=false;
  if(error){ err.textContent=error.message==='Invalid login credentials'?'Email atau password salah.':error.message; err.classList.remove('hidden'); return; }
};

const doLogout = async () => {
  if(!confirm('Keluar dari aplikasi?')) return;
  await sb.auth.signOut();
};

sb.auth.onAuthStateChange((event, session) => {
  if(session?.user){
    hideLogin();
    S.currentUser = session.user.email || '';
    S.isAdmin = false;
    document.getElementById('nav-user').textContent = S.currentUser;
    document.querySelectorAll('.admin-only').forEach(el=>el.classList.add('hidden'));

const dRender = debounce(()=>render());
const applyDCFilter = () => {
  S.fpart = document.getElementById('inp-fpart')?.value?.trim()||'';

};
const rpN = v => +String(v||'').replace(/[^\d.-]/g,'') || 0;
const rp  = v => v!=null&&v!=='' ? 'Rp '+rpN(v).toLocaleString('id-ID') : '-';
const df  = d => { if(!d) return '-'; const p=String(d).split('-'); return p.length===3&&p[0].length===4?`${p[2]}/${p[1]}/${p[0]}`:d; };
const daysLeft = d => { if(!d) return null; return Math.ceil((new Date(d+'T00:00:00')-new Date())/86400000); };
const sisaHari = d => {
  const n=daysLeft(d); if(n===null) return '-';
  if(n<0)   return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">⚠ Expired ${Math.abs(n)}h</span>`;
  if(n<=30)  return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">🔴 ${n} hari</span>`;
  if(n<=100) return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">⚠ ${n} hari</span>`;
  return `<span class="text-xs text-gray-400">${n} hari</span>`;
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dn  = v => v||null;
const genCustomID = (prefix, arr, field='customID') => {
  const yy = String(new Date().getFullYear()).slice(-2);
  const pat = new RegExp(`^${prefix}-${yy}-(\\d+)$`);
  const max = arr.reduce((m,x) => { const n=((x[field]||'').match(pat)||[])[1]; return n?Math.max(m,+n):m; }, 0);
  return `${prefix}-${yy}-${String(max+1).padStart(3,'0')}`;
};

// ===== LOAD ALL DATA =====
const loadAll = async () => {
  setLoad(true,'Memuat data dari Supabase...');
  const [r1,r2,r3,r4,r5,r6,r7,r8,r9,r10,r11] = await Promise.all([
    sb.from('spk').select('*').order('tanggal',{ascending:false}),
    sb.from('direct_charge').select('*').order('tanggal',{ascending:false}),
    sb.from('master_kontrak').select('*').eq('jenis','HHE').order('custom_id'),
    sb.from('coo_spk').select('*').eq('jenis','HHE').or('fungsi.is.null,fungsi.eq.Hoist').order('tgl_terbit',{ascending:false}),
    sb.from('master_kontrak').select('*').eq('jenis','Static').order('custom_id'),
    sb.from('coo_spk').select('*').eq('jenis','Static').order('tgl_terbit',{ascending:false}),
    sb.from('purchase_request').select('*').order('tgl_pr',{ascending:false}),
    sb.from('penagihan_sa').select('*').order('tgl_sa',{ascending:false}),
    sb.from('user_profiles').select('*').order('email'),
    sb.from('tvm_coo').select('*').order('tgl_mulai',{ascending:false}),
    sb.from('coo_spk').select('*').eq('fungsi','Rotating').order('tgl_terbit',{ascending:false}),
  ]);
  S.sspk  = (r1.data||[]).map(F.from.spk);
  S.dc    = (r2.data||[]).map(F.from.dc);
  S.mk    = (r3.data||[]).map(F.from.mk);
  S.spk   = (r4.data||[]).map(F.from.coo);
  S.mkS   = (r5.data||[]).map(F.from.mk);
  S.spkS  = (r6.data||[]).map(F.from.coo);
  S.pr    = (r7.data||[]).map(F.from.pr);
  S.sa    = (r8.data||[]).map(F.from.sa);
  S.users = (r9.data||[]);
  S.tvm   = (r10.data||[]).map(F.from.tvm);
  S.spkR  = (r11.data||[]).map(F.from.coo);
  // MK Rotating = kontrak HHE yang punya SPK dengan fungsi='Rotating'
  const rotKIds = new Set(S.spkR.map(x=>x.idKontrak));
  S.mkR   = S.mk.filter(k=>rotKIds.has(k.id));
  const myProfile = S.users.find(u=>u.email===S.currentUser);
  S.currentNama = myProfile?.nama || '';
  S.isAdmin = myProfile?.role === 'admin';
  document.getElementById('nav-user').textContent = S.currentNama || S.currentUser;
  document.querySelectorAll('.admin-only').forEach(el=>el.classList.toggle('hidden',!S.isAdmin));
  setLoad(false);
  render();
};

// ===== FILTERS =====
const byDate = (arr,f) => arr.filter(x => {
  const v=x[f]; if(!v) return true;
  if(S.fy && !String(v).startsWith(S.fy)) return false;
  if(S.fm && String(v).substring(5,7) !== S.fm.padStart(2,'0')) return false;
  return true;
});
const byK = arr => {
  if(!S.fkontrak) return arr;
  const ids = S.spk.filter(x=>x.idKontrak===S.fkontrak).map(x=>x.id);
  return arr.filter(x=>ids.includes(x.idCoO));
};

const rDash = () => {
  const saF     = byDate(S.sa,'tglSA');
  const saBySpk = {};
  saF.forEach(x=>{ saBySpk[x.idCoO]=(saBySpk[x.idCoO]||0)+rpN(x.nilaiSA); });
  const saIds = id => S.spk.filter(x=>x.idKontrak===id).reduce((a,x)=>a+(saBySpk[x.id]||0),0);

  // ─ Hoist stats ─
  const mkH  = S.mk, spkH = S.spk;
  const mkHNilai   = mkH.reduce((a,x)=>a+rpN(x.nilaiKontrak),0);
  const spkHNilai  = spkH.reduce((a,x)=>a+rpN(x.nilaiSPK),0);
  const saHNilai   = saF.reduce((a,x)=>a+rpN(x.nilaiSA),0);
  const pctH       = spkHNilai>0 ? Math.round(saHNilai/spkHNilai*100) : 0;
  const spkWithSA  = new Set(saF.map(x=>x.idCoO));
  const spkNoSAH   = spkH.filter(x=>!spkWithSA.has(x.id)&&x.status!=='Closed').length;
  const spkWithPR  = new Set(S.pr.map(x=>x.idCoO));

// ===== PERMINTAAN PART (DC + Reservasi) =====
const rDC = () => {
  const isDC = S.dcTab === 'dc';
  const jenis = isDC ? 'Direct Charge' : 'Reservasi';
  const all = byDate(S.dc,'tanggal');
  const byJenis = all.filter(x => (x.jenis||'Direct Charge') === jenis);
  const data = isDC ? byJenis.filter(d => {
    if(S.fpo && d.nomorPO !== S.fpo) return false;
    const items = d.items?.length ? d.items : [{namaPart:d.namaPart,kimap:d.kimap,partNumber:d.partNumber}];
    if(S.fpart && !items.some(x=>(x.partNumber||'').toLowerCase().includes(S.fpart.toLowerCase()))) return false;
    if(S.fdesc && !items.some(x=>(x.namaPart||'').toLowerCase().includes(S.fdesc.toLowerCase()))) return false;
    return true;
  }) : byJenis;
  const total = data.reduce((a,x) => a+rpN(x.total), 0);

  const tabBtn = (t, label) => {
    const active = S.dcTab === t;
    const colActive = t==='dc' ? 'border-indigo-600 text-indigo-700' : 'border-violet-600 text-violet-700';
    return `<button onclick="S.dcTab='${t}';render()" class="px-4 py-2 text-sm font-medium border-b-2 transition ${active ? colActive+' bg-white font-semibold' : 'border-transparent text-gray-500 hover:text-gray-700 bg-gray-50'}">${label}</button>`;
  };

  // DC: monthly breakdown for selected/current year
  const dcYear = S.fy || new Date().getFullYear().toString();
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agt','Sep','Okt','Nov','Des'];
  const dcMonths = MONTH_NAMES.map((label,i)=>({ m:String(i+1).padStart(2,'0'), label, nilai:0, count:0 }));
  byJenis.filter(x=>x.tanggal&&x.tanggal.startsWith(dcYear)).forEach(d=>{
    const mo = dcMonths.find(x=>x.m===(d.tanggal||'').substring(5,7));
    if(mo){ mo.nilai+=rpN(d.total); mo.count++; }
  });
  const dcMonthMax = Math.max(...dcMonths.map(x=>x.nilai),1);
  const dcTotalYear = dcMonths.reduce((a,x)=>a+x.nilai,0);
  const dcMonthActive = dcMonths.filter(x=>x.count>0).length||1;

  // Reservasi: all unique years for per-tahun rekap
  const resYears = [...new Set(byJenis.filter(x=>x.tanggal).map(x=>x.tanggal.substring(0,4)))].sort();

  const thDC  = [['Tanggal','center'],['No. PO/RO'],['Status','center'],['Total','right'],['Judul Pekerjaan'],['','center']];
  const thRes = [['No. Reservasi'],['No. MR'],['Tanggal','center'],['Status','center'],['','center']];
  const th = isDC ? thDC : thRes;
  const ncols = th.length;

  const rowDC = d => {
    const items=d.items?.length?d.items:[{namaPart:d.namaPart,jumlah:d.jumlah,satuan:d.satuan,kimap:d.kimap,hargaSatuan:d.hargaSatuan}];
    const grandTotal=items.reduce((a,x)=>a+(+x.jumlah||1)*(+x.hargaSatuan||0),0);
    return `
    <tr class="bg-indigo-50 border-t-2 border-indigo-200 border-l-4 border-l-indigo-500">
      <td class="px-4 py-2.5 text-center text-gray-500 whitespace-nowrap text-xs">${df(d.tanggal)}</td>
      <td class="px-4 py-2.5 font-semibold text-indigo-700 whitespace-nowrap">${esc(d.nomorPO||'-')}</td>
      <td class="px-4 py-2.5 text-center">${badge(d.status)}</td>
      <td class="px-4 py-2.5 text-right font-mono font-bold whitespace-nowrap">${rp(grandTotal)}</td>
      <td class="px-4 py-2.5 text-gray-400 text-xs max-w-xs"><div class="clamp2">${esc(d.keterangan||'-')}</div></td>
      <td class="px-4 py-2.5 text-center whitespace-nowrap no-print">
        <button onclick="mDC('${d.id}')" class="text-blue-600 hover:underline mr-2">Edit</button>
        <button onclick="dDC('${d.id}')" class="text-red-500 hover:underline">Hapus</button>
        ${byLine(d)}
      </td>
    </tr>
    <tr>
      <td colspan="6" class="px-3 pt-0 pb-3 bg-indigo-50/30">
        <div class="ml-4 border border-indigo-100 rounded-lg overflow-hidden shadow-sm">
          <table class="w-full text-xs">
            <thead class="bg-indigo-100 text-indigo-700 border-b border-indigo-200">
              <tr>
                <th class="px-3 py-1.5 text-left font-medium w-6">#</th>
                <th class="px-3 py-1.5 text-left font-medium">Nama Part / Material</th>
                <th class="px-3 py-1.5 text-left font-medium">Part Number</th>
                <th class="px-3 py-1.5 text-left font-medium">KIMAP</th>
                <th class="px-3 py-1.5 text-center font-medium w-14">Qty</th>
                <th class="px-3 py-1.5 text-left font-medium w-16">Satuan</th>
                <th class="px-3 py-1.5 text-right font-medium">Harga Satuan</th>
                <th class="px-3 py-1.5 text-right font-medium">Total</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 bg-white">
              ${items.map((item,i)=>{
                const hitPart=S.fpart&&(item.partNumber||'').toLowerCase().includes(S.fpart.toLowerCase());
                const hitDesc=S.fdesc&&(item.namaPart||'').toLowerCase().includes(S.fdesc.toLowerCase());
                const hit=hitPart||hitDesc;
                return `<tr class="${hit?'bg-yellow-50 border-l-4 border-yellow-400':'hover:bg-gray-50'}">
                <td class="px-3 py-1.5 text-gray-400">${i+1}</td>
                <td class="px-3 py-1.5 font-medium ${hit?'text-yellow-800':'text-gray-800'}">${esc(item.namaPart||'-')}</td>
                <td class="px-3 py-1.5 whitespace-nowrap font-medium ${hit?'text-yellow-700':'text-blue-700'}">${esc(item.partNumber||'-')}</td>
                <td class="px-3 py-1.5 text-gray-500 whitespace-nowrap">${esc(item.kimap||'-')}</td>
                <td class="px-3 py-1.5 text-center">${+item.jumlah||1}</td>
                <td class="px-3 py-1.5 text-gray-500">${esc(item.satuan||'-')}</td>
                <td class="px-3 py-1.5 text-right font-mono">${rp(+item.hargaSatuan||0)}</td>
                <td class="px-3 py-1.5 text-right font-mono font-semibold">${rp((+item.jumlah||1)*(+item.hargaSatuan||0))}</td>
              </tr>`;}).join('')}
            </tbody>
          </table>
        </div>
      </td>
    </tr>`;
  };

  const rowRes = d => {
    const items=d.items?.length?d.items:[{namaPart:d.namaPart,jumlah:d.jumlah,satuan:d.satuan,kimap:d.kimap}];
    return `
    <tr class="bg-violet-50 border-t-2 border-violet-200 border-l-4 border-l-violet-500">
      <td class="px-4 py-2.5 font-semibold text-violet-700 whitespace-nowrap">${esc(d.nomorReservasi||'-')}</td>
      <td class="px-4 py-2.5 text-gray-500 whitespace-nowrap text-xs">${esc(d.nomorMR||'-')}</td>
      <td class="px-4 py-2.5 text-center text-gray-500 whitespace-nowrap text-xs">${df(d.tanggal)}</td>
      <td class="px-4 py-2.5 text-center">${badge(d.status||'MR Dibuat')}</td>
      <td class="px-4 py-2.5 text-center whitespace-nowrap no-print">
        <button onclick="mDC('${d.id}')" class="text-blue-600 hover:underline mr-2">Edit</button>
        <button onclick="dDC('${d.id}')" class="text-red-500 hover:underline">Hapus</button>
        ${byLine(d)}
      </td>
    </tr>
    <tr>
      <td colspan="5" class="px-3 pt-0 pb-3 bg-violet-50/30">
        <div class="ml-4 border border-violet-100 rounded-lg overflow-hidden shadow-sm">
          <table class="w-full text-xs">
            <thead class="bg-violet-100 text-violet-700 border-b border-violet-200">
              <tr>
                <th class="px-3 py-1.5 text-left font-medium w-6">#</th>
                <th class="px-3 py-1.5 text-left font-medium">Nama Part / Material</th>
                <th class="px-3 py-1.5 text-left font-medium">Part Number</th>
                <th class="px-3 py-1.5 text-left font-medium">KIMAP</th>
                <th class="px-3 py-1.5 text-center font-medium w-14">Qty</th>
                <th class="px-3 py-1.5 text-left font-medium w-16">Satuan</th>
                <th class="px-3 py-1.5 text-left font-medium">Diambil Oleh</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 bg-white">
              ${items.map((item,i)=>`
              <tr class="hover:bg-gray-50">
                <td class="px-3 py-1.5 text-gray-400">${i+1}</td>
                <td class="px-3 py-1.5 text-gray-800 font-medium">${esc(item.namaPart||'-')}</td>
                <td class="px-3 py-1.5 text-blue-700 whitespace-nowrap font-medium">${esc(item.partNumber||'-')}</td>
                <td class="px-3 py-1.5 text-gray-500 whitespace-nowrap">${esc(item.kimap||'-')}</td>
                <td class="px-3 py-1.5 text-center">${+item.jumlah||1}</td>
                <td class="px-3 py-1.5 text-gray-500">${esc(item.satuan||'-')}</td>
                <td class="px-3 py-1.5 text-gray-500">${esc(d.diambilOleh||'-')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </td>
    </tr>`;
  };

  // Reservasi rekap per tahun
  const rekapPerTahun = () => {
    const map = {};
    byJenis.forEach(d => {
      const yr = (d.tanggal||'').substring(0,4);
      if(!yr) return;
      const items = d.items?.length ? d.items : [{namaPart:d.namaPart,jumlah:d.jumlah,satuan:d.satuan,kimap:d.kimap,partNumber:''}];
      items.filter(x=>x.namaPart).forEach(item => {
        const key = (item.namaPart||'').trim().toLowerCase();
        if(!map[key]) map[key] = {nama:item.namaPart, partNumber:item.partNumber||'', kimap:item.kimap||'', satuan:item.satuan||'-', byYear:{}, total:0};
        map[key].byYear[yr] = (map[key].byYear[yr]||0) + (+item.jumlah||1);
        map[key].total += (+item.jumlah||1);
        if(item.partNumber && !map[key].partNumber) map[key].partNumber = item.partNumber;
        if(item.kimap && !map[key].kimap) map[key].kimap = item.kimap;
      });
    });
    return Object.values(map).sort((a,b)=>b.total-a.total);

  return `<div class="fade-in">

const rSPK = () => {
  let data = byDate(S.spk,'tglTerbit');
  if(S.fkontrak) data = data.filter(x=>x.idKontrak===S.fkontrak);

  // Hitung PR & SA per SPK
  const prMap = {}; S.pr.forEach(p=>{ prMap[p.idCoO]=p; });
  const saMap = {}; S.sa.forEach(a=>{ if(!saMap[a.idCoO]) saMap[a.idCoO]=[]; saMap[a.idCoO].push(a); });

  const totalSPK  = data.reduce((a,x)=>a+rpN(x.nilaiSPK),0);
  const totalSA   = data.reduce((a,s)=>{
    const sa=saMap[s.id]||[]; return a+sa.reduce((b,x)=>b+rpN(x.nilaiSA),0);
  },0);
  const pctReal   = totalSPK>0 ? (totalSA/totalSPK*100).toFixed(1) : 0;

  // Summary cards per kontrak
  const mkMap = {};
  S.mk.forEach(k=>{ mkMap[k.id]={...k,countSPK:0,totalSPK:0,totalSA:0}; });
  S.spk.forEach(s=>{
    if(!mkMap[s.idKontrak]) return;
    const sa=saMap[s.id]||[];
    mkMap[s.idKontrak].countSPK++;
    mkMap[s.idKontrak].totalSPK += rpN(s.nilaiSPK);
    mkMap[s.idKontrak].totalSA  += sa.reduce((b,x)=>b+rpN(x.nilaiSA),0);

  const summaryCards = !S.fkontrak ? `

// ===== PIPELINE STATIC =====
const rPLS = () => {
  const hasPR   = s => !!s.nomorPR;
  const hasPO   = s => !!s.nomorPO;
  const hasSA   = s => !!s.nomorSA;
  const hasReal = s => !!rpN(s.nilaiRealisasi);
  const isLengkap = s => hasPR(s) && hasPO(s) && hasSA(s);
  const isPending = s => !isLengkap(s) && s.status !== 'Closed';

  const all = S.spkS;
  let data = all;
  if(S.fkontrak) data = data.filter(x=>x.idKontrak===S.fkontrak);

  const nPR   = all.filter(hasPR).length;
  const nPO   = all.filter(hasPO).length;
  const nSA   = all.filter(hasSA).length;
  const nReal = all.filter(hasReal).length;
  const nPend = all.filter(isPending).length;

  const tabBtn=(t,label)=>{const a=S.plsTab===t;return `<button onclick="S.plsTab='${t}';render()" class="px-4 py-2 text-sm font-medium border-b-2 transition ${a?'border-teal-600 text-teal-700 bg-white font-semibold':'border-transparent text-gray-500 hover:text-gray-700 bg-gray-50'}">${label}</button>`;};

  // Per kontrak pipeline stats
  const perKRows = S.mkS.map(k=>{
    const spks  = S.spkS.filter(x=>x.idKontrak===k.id);
    if(!spks.length) return null;
    const wPR   = spks.filter(hasPR).length;
    const wPO   = spks.filter(hasPO).length;
    const wSA   = spks.filter(hasSA).length;
    const wReal = spks.filter(hasReal).length;
    const nilaiSPK  = spks.reduce((a,x)=>a+rpN(x.nilaiSPK),0);
    const nilaiReal = spks.reduce((a,x)=>a+rpN(x.nilaiRealisasi),0);
    const pending   = spks.filter(isPending).length;
    return {k, n:spks.length, wPR, wPO, wSA, wReal, nilaiSPK, nilaiReal, pending};
  }).filter(Boolean);

  const stepBar=(done,total,label,colOn,colOff)=>{
    const pct=total>0?Math.round(done/total*100):0;
    return `<div class="flex flex-col items-center gap-0.5 min-w-[52px]">
      <span class="text-[10px] font-semibold ${done===total&&total>0?colOn:done>0?'text-blue-500':colOff}">${done}/${total}</span>

        <div class="${done===total&&total>0?'bg-emerald-500':done>0?'bg-blue-400':'bg-gray-200'} h-1.5 rounded-full" style="width:${pct}%"></div>

  };

  // Detail table helper
  const docBadge=(has,label,val)=>has
    ?`<span class="inline-flex items-center gap-1 text-[10px] font-semibold px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 border border-emerald-200" title="${esc(val||'')}">✓ ${label}: ${esc((val||'').slice(-10))}</span>`
    :`<span class="inline-flex items-center text-[10px] px-1.5 py-0.5 rounded bg-gray-50 text-gray-300 border border-gray-100">– ${label}</span>`;

  const pendingData = data.filter(isPending);

        <p class="text-[10px] text-gray-400">${all.filter(x=>x.status!=='Closed').length} aktif</p>

        <p class="text-xl font-bold text-blue-700">${nPO}</p>
        <p class="text-[10px] text-gray-400">${all.length-nPO} belum</p>

    <!-- TABS -->
    <div class="flex border-b border-gray-200 mb-4 bg-gray-50">
      ${tabBtn('perkontrak','📊 Per Kontrak')}

    ${S.plsTab==='perkontrak'?`

        <table class="w-full text-sm">
          ${thead([['No. Kontrak'],['Vendor'],['SPK','center'],['Pipeline PR → PO → SA → Tagih'],['Pending','center'],['Nilai SPK','right'],['Tagih','right']])}
          <tbody class="divide-y divide-gray-100">
            ${perKRows.length===0?emptyRow('📊','Belum ada data.',7):perKRows.map(({k,n,wPR,wPO,wSA,wReal,nilaiSPK,nilaiReal,pending})=>`

              <td class="px-3 py-3 text-right font-mono text-emerald-700">${rp(S.spkS.reduce((a,x)=>a+rpN(x.nilaiRealisasi),0))}</td>
            </tr>
          </tfoot>
        </table>
      </div>

const rSA = () => {
  const allSA  = byDate(byK(S.sa),'tglSA');
  let   data   = allSA;
  if(S.fkontrak){
    const spkIds=new Set(S.spk.filter(x=>x.idKontrak===S.fkontrak).map(x=>x.id));
    data = allSA.filter(x=>spkIds.has(x.idCoO));
  }
  const total  = data.reduce((a,x)=>a+rpN(x.nilaiSA),0);
  const spkWithSA=new Set(S.sa.map(x=>x.idCoO));
  let spkNoSA=S.spk.filter(x=>!spkWithSA.has(x.id)&&x.status!=='Closed');
  if(S.fkontrak) spkNoSA=spkNoSA.filter(x=>x.idKontrak===S.fkontrak);

  const tabBtn=(t,label)=>{const a=S.saTab===t;return `<button onclick="S.saTab='${t}';render()" class="px-4 py-2 text-sm font-medium border-b-2 transition ${a?'border-emerald-600 text-emerald-700 bg-white font-semibold':'border-transparent text-gray-500 hover:text-gray-700 bg-gray-50'}">${label}</button>`;};

    const saList   = S.sa.filter(x=>spks.find(s=>s.id===x.idCoO));
    const saNilai  = saList.reduce((a,x)=>a+rpN(x.nilaiSA),0);
    const spkOpen  = spks.filter(x=>!spkWithSA.has(x.id)&&x.status!=='Closed').length;
    const pct = spkNilai>0 ? Math.min(Math.round(saNilai/spkNilai*100),100) : 0;
    const bar = pct>=100?'bg-emerald-500':pct>=50?'bg-blue-500':'bg-amber-400';
    return {k, spkCount:spks.length, spkNilai, saNilai, spkOpen, saCount:saList.length, pct, bar};
  }).filter(x=>x.spkCount>0);
  const totSpkNilai=perKRows.reduce((a,x)=>a+x.spkNilai,0);

    ${S.saTab==='perkontrak'?`

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          ${thead([['ID Kontrak'],['Vendor'],['SPK','center'],['Nilai SPK','right'],['SA Dibuat','center'],['Realisasi SA','right'],['Sisa','right'],['Progress','center'],['SPK Open','center']])}
          <tbody class="divide-y divide-gray-100">
            ${perKRows.length===0?emptyRow('📊','Belum ada data.',9):perKRows.map(({k,spkCount,spkNilai,saNilai,spkOpen,saCount,pct,bar})=>`
              <tr class="hover:bg-gray-50 cursor-pointer" onclick="S.fkontrak='${k.id}';S.saTab='list';render()">
                <td class="px-4 py-3 font-semibold text-blue-700 whitespace-nowrap text-xs">${esc(k.customID)}</td>
                <td class="px-4 py-3 max-w-[160px]"><div class="clamp2 text-xs text-gray-600">${esc(k.vendor)}</div></td>
                <td class="px-4 py-3 text-center text-gray-500 text-xs">${spkCount}</td>
                <td class="px-4 py-3 text-right font-mono text-xs whitespace-nowrap">${rp(spkNilai)}</td>
                <td class="px-4 py-3 text-center text-xs text-gray-500">${saCount}</td>

    :S.saTab==='list'?`

      ${(()=>{ const k=S.mk.find(x=>x.id===S.fkontrak); return k?`<span class="text-xs text-gray-400">|</span><span class="text-xs font-semibold text-blue-700">${esc(k.customID)}</span> <span class="text-xs text-gray-400">${esc(k.vendor)}</span>`:''; })()}
    </div>`:''}
    <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="overflow-x-auto">
      <table class="w-full text-sm">

const dcSyncFromDOM = () => {
  const rows = document.querySelectorAll('#dc-items-body tr');
  _dcItems = [...rows].map(r => ({
    namaPart: r.querySelector('[data-f=namaPart]')?.value?.trim()||'',
    partNumber: r.querySelector('[data-f=partNumber]')?.value?.trim()||'',
    jumlah: +(r.querySelector('[data-f=jumlah]')?.value||1),
    satuan: r.querySelector('[data-f=satuan]')?.value?.trim()||'pcs',
    kimap: r.querySelector('[data-f=kimap]')?.value?.trim()||'',
    hargaSatuan: +(r.querySelector('[data-f=hargaSatuan]')?.value||0)
  }));
};

const dcRenderItems = () => {
  const body = document.getElementById('dc-items-body');
  if(body) body.innerHTML = _dcItems.map(item=>dcItemRow(item)).join('');
  dcUpdateGrand();
};

const dcAddItem = () => {
  dcSyncFromDOM();
  _dcItems.push({namaPart:'',jumlah:1,satuan:'pcs',kimap:'',hargaSatuan:0});
  dcRenderItems();
  document.querySelector('#dc-items-body tr:last-child [data-f=namaPart]')?.focus();
};

const dcRemoveItem = btn => {
  dcSyncFromDOM();
  const row = btn.closest('tr');
  const idx = [...document.querySelectorAll('#dc-items-body tr')].indexOf(row);
  if(idx>=0) _dcItems.splice(idx,1);
  if(!_dcItems.length) _dcItems.push({namaPart:'',jumlah:1,satuan:'pcs',kimap:'',hargaSatuan:0});
  dcRenderItems();
};

const dcUpdateGrand = () => {
  if(_dcIsRes) return;
  let grand=0;
  document.querySelectorAll('#dc-items-body tr').forEach(r=>{
    const jml=+(r.querySelector('[data-f=jumlah]')?.value||1);
    const hrg=+(r.querySelector('[data-f=hargaSatuan]')?.value||0);
    const totCell=r.querySelector('.dc-row-total');
    if(totCell) totCell.textContent=rp(jml*hrg);
    grand+=jml*hrg;
  });
  const gt=document.getElementById('dc-grand-total');
  if(gt) gt.textContent=rp(grand);
};

const getDCItemsFromDOM = () => {
  return [...document.querySelectorAll('#dc-items-body tr')].map(r=>({
    namaPart: r.querySelector('[data-f=namaPart]')?.value?.trim()||'',
    partNumber: r.querySelector('[data-f=partNumber]')?.value?.trim()||'',
    jumlah: +(r.querySelector('[data-f=jumlah]')?.value||1),
    satuan: r.querySelector('[data-f=satuan]')?.value?.trim()||'pcs',
    kimap: r.querySelector('[data-f=kimap]')?.value?.trim()||'',
    hargaSatuan: +(r.querySelector('[data-f=hargaSatuan]')?.value||0),
    total: (+(r.querySelector('[data-f=jumlah]')?.value||1))*(+(r.querySelector('[data-f=hargaSatuan]')?.value||0))
  }));
};

const svUser = async (e,id) => {
  e.preventDefault(); const f=e.target;
  const nama=f.nama.value.trim();
  const role=f.role.value;
  if(id){
    // Edit: hanya update nama & role di profil
    const {error}=await sb.from('user_profiles').update({nama,role}).eq('id',id);
    if(dbErr(error)) return;
    const i=S.users.findIndex(x=>x.id===id);
    if(i>=0) S.users[i]={...S.users[i],nama,role};
    closeModal(); render();
  } else {
    // Tambah baru: buat akun Auth dulu via temp client (agar sesi admin tidak terganti)
    const email=f.email.value.trim().toLowerCase();
    const password=f.password.value;
    setLoad(true,'Membuat akun...');
    const tmpSb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { storageKey: 'rekap-tmp-auth', persistSession: false, autoRefreshToken: false }
    });
    const {data, error:authErr} = await tmpSb.auth.signUp({email, password});
    if(authErr){ setLoad(false); alert('Gagal buat akun:\n'+authErr.message); return; }
    // Daftarkan profil (gunakan UUID dari Auth, atau generate sendiri jika belum confirm)
    const userId = data?.user?.id;
    if(!userId){ setLoad(false); alert('Akun berhasil dibuat. Pengguna perlu konfirmasi email sebelum profil terdaftar otomatis.\nPastikan trigger Supabase sudah aktif.'); closeModal(); return; }
    const {error:profErr} = await sb.from('user_profiles').upsert({id:userId, email, nama, role});
    setLoad(false);
    if(profErr){ alert('Akun berhasil dibuat tapi profil gagal disimpan:\n'+profErr.message); closeModal(); return; }
    S.users.push({id:userId, email, nama, role});
    S.users.sort((a,b)=>a.email.localeCompare(b.email));
    closeModal(); render();
    alert(`Akun berhasil dibuat!\n\nEmail: ${email}\n\nJika konfirmasi email aktif, pengguna perlu klik link di email mereka sebelum bisa login.`);
  }
};

const exportRekapRes = () => {
  const resOnly=byDate(S.dc,'tanggal').filter(x=>x.jenis==='Reservasi');
  const map={};
  resOnly.forEach(d=>{
    const items=d.items?.length?d.items:[{namaPart:d.namaPart,jumlah:d.jumlah,satuan:d.satuan,kimap:d.kimap,partNumber:''}];
    items.filter(x=>x.namaPart).forEach(item=>{
      const key=(item.namaPart||'').trim().toLowerCase();
      if(!map[key]) map[key]={nama:item.namaPart,partNumber:item.partNumber||'',kimap:item.kimap||'',satuan:item.satuan||'-',totalQty:0,count:0};
      map[key].totalQty+=(+item.jumlah||1); map[key].count++;
      if(item.partNumber&&!map[key].partNumber) map[key].partNumber=item.partNumber;
      if(item.kimap&&!map[key].kimap) map[key].kimap=item.kimap;
    });
  });
  const rows=Object.values(map).sort((a,b)=>b.totalQty-a.totalQty);
  if(!rows.length){alert('Tidak ada data rekap reservasi untuk filter aktif.');return;}
  const label=(S.fy?'Tahun '+S.fy:'Semua Tahun')+(S.fm?' Bulan '+S.fm:'');
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([
    ['Rekap Material Reservasi — '+label],
    [],
    ['No','Nama Part / Material','Part Number','KIMAP','Satuan','Total Qty','Frekuensi'],
    ...rows.map((p,i)=>[i+1,p.nama,p.partNumber,p.kimap,p.satuan,p.totalQty,p.count+'x']),
    [],
    ['','','','','TOTAL',rows.reduce((a,x)=>a+x.totalQty,0),'']
  ]);
  ws['!cols']=[{wch:4},{wch:36},{wch:16},{wch:16},{wch:8},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'Rekap Reservasi');
  XLSX.writeFile(wb,`Rekap_Reservasi_${S.fy||'Semua'}.xlsx`);
};

// ===== IMPORT EXCEL → SUPABASE =====
const importExcel = input => {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload = async e => {
    try {
      const wb=XLSX.read(e.target.result,{type:'array'});
      const rdSheet=(name,map)=>{
        const ws=wb.Sheets[name]; if(!ws) return [];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!rows.length) return [];
        const head=rows[0].map(h=>String(h||'').trim());
        return rows.slice(1).filter(r=>r.some(v=>v!=null&&v!=='')).map(r=>{
          const o={};
          map.forEach(([from,to])=>{ const i=head.indexOf(from); o[to]=i>=0?String(r[i]||'').replace(/_x000d_\n/g,'\n').trim():''; });
          return o;
        });
      };
      const sspk=rdSheet('SPK',[['LocalID','id'],['NoSPK','noSPK'],['Tanggal','tanggal'],['Vendor','vendor'],['Uraian','uraian'],['NilaiKontrak','nilaiKontrak'],['Realisasi','realisasi'],['Progress','progress'],['Status','status'],['JenisAnggaran','jenisAnggaran'],['Keterangan','keterangan']]);
      const dcRaw=rdSheet('Permintaan Part',[['LocalID','id'],['Jenis','jenis'],['Tanggal','tanggal'],['NamaPart','namaPart'],['Jumlah','jumlah'],['Satuan','satuan'],['HargaSatuan','hargaSatuan'],['Total','total'],['KIMAP','kimap'],['NomorPO','nomorPO'],['NomorMR','nomorMR'],['NomorReservasi','nomorReservasi'],['DiambilOleh','diambilOleh'],['Status','status'],['JudulPekerjaan','keterangan'],['Items','items']]);
      const dc=dcRaw.map(d=>({...d,items:d.items?JSON.parse(d.items):[]}));
      const mk  =rdSheet('Master Kontrak',[['LocalID','id'],['CustomID','customID'],['NomorSPB','nomorSPB'],['Vendor','vendor'],['JudulKontrak','judulKontrak'],['NilaiKontrak','nilaiKontrak'],['TglMulai','tglMulai'],['TglBerakhir','tglBerakhir'],['PIC','pic'],['Status','status']]);
      const spk =rdSheet('CoO SPK',[['LocalID','id'],['IDKontrak','idKontrak'],['CustomID','customID'],['NomorSPK','nomorSPK'],['Deskripsi','deskripsi'],['NilaiSPK','nilaiSPK'],['TglTerbit','tglTerbit'],['TglMulai','tglMulai'],['TglSelesai','tglSelesai'],['Status','status'],['Catatan','catatan']]);
      const pr  =rdSheet('Purchase Request',[['LocalID','id'],['IDCoO','idCoO'],['CustomID','customID'],['NomorPR','nomorPR'],['TglPR','tglPR'],['Deskripsi','deskripsi'],['EstimasiNilai','estimasiNilai'],['Catatan','catatan']]);
      const sa  =rdSheet('Penagihan SA',[['LocalID','id'],['IDCoO','idCoO'],['CustomID','customID'],['NomorSA','nomorSA'],['TglSA','tglSA'],['Deskripsi','deskripsi'],['NilaiSA','nilaiSA'],['NomorInvoice','nomorInvoice'],['Catatan','catatan']]);
      const tvm =rdSheet('TVM',[['LocalID','id'],['NomorCOO','nomorCOO'],['NomorPR','nomorPR'],['Fungsi','fungsi'],['Deskripsi','deskripsi'],['Nilai','nilai'],['TglMulai','tglMulai'],['TglSelesai','tglSelesai'],['Status','status'],['Catatan','catatan']]);

      const total=sspk.length+dc.length+mk.length+spk.length+pr.length+sa.length+tvm.length;
      if(!total){alert('Tidak ada data terbaca.\nPastikan nama sheet: SPK, Permintaan Part, Master Kontrak, CoO SPK, Purchase Request, Penagihan SA, TVM');return;}

      if(!confirm(`Data ditemukan:\n• ${sspk.length} SPK\n• ${dc.length} Permintaan Part\n• ${mk.length} Master Kontrak\n• ${spk.length} CoO SPK\n• ${pr.length} Purchase Request\n• ${sa.length} Penagihan SA\n• ${tvm.length} TVM\n\nUpload ke Supabase? (Data lama akan di-replace)`)) return;

      setLoad(true,'Mengupload ke Supabase...');
      const ups = async (table, rows, conv) => {
        if(!rows.length) return;
        const {error}=await sb.from(table).upsert(rows.map(conv));
        if(error) throw error;
      };
      // urutan penting: parent dulu sebelum child
      await ups('spk',sspk,F.to.spk);
      await ups('direct_charge',dc,F.to.dc);
      await ups('master_kontrak',mk,F.to.mk);
      await ups('coo_spk',spk,F.to.coo);
      await ups('purchase_request',pr,F.to.pr);
      await ups('penagihan_sa',sa,F.to.sa);
      await ups('tvm_coo',tvm,F.to.tvm);

      await loadAll();
      alert(`Import berhasil! ${total} data diupload ke Supabase.`);
    } catch(err){ setLoad(false); alert('Gagal import:\n'+err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
};

// ===== REFRESH / PERBARUI DATA =====
const doRefresh = () => { window.location.href = window.location.pathname + '?v=' + Date.now(); };

// ===== INIT =====
document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-box').addEventListener('change', e=>{
  if(e.target.name==='jenis') dcToggleFields(e.target.value);
});
go('dashboard');
</script>

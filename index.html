<!DOCTYPE html>
<html lang="id">
<head>

<body class="bg-gray-100 min-h-screen text-sm">

<!-- Login Screen -->
<div id="login-screen" class="fixed inset-0 z-[100] bg-blue-950 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8">
    <div class="text-center mb-7">
      <div class="text-4xl mb-3">📋</div>

      <p class="text-xs text-gray-400 mt-1">Prabumulih Field — Pertamina EP</p>
    </div>
    <form onsubmit="doLogin(event)" class="flex flex-col gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-600 mb-1">Email</label>

</div>

    <button onclick="go('dashboard')" id="nav-dashboard" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-blue-100 hover:bg-blue-800 transition w-full text-left">

  <!-- User & logout -->
  <div class="px-4 py-4 border-t border-blue-800/60">

      <span id="refresh-icon">🔄</span> <span id="refresh-label">Perbarui Data</span>
    </button>

    <button onclick="doLogout()" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-xs text-blue-200 hover:bg-red-700 hover:text-white transition">

<script>
// ================================================================
// CONFIG — ganti dengan URL & key dari Supabase project Anda
// ================================================================
const SUPABASE_URL  = 'https://amccxxhmekmjsjwjpnfw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtY2N4eGhtZWttanNqd2pwbmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTI2NjgsImV4cCI6MjA5NzI2ODY2OH0.nbEEcqTVNb0WWxQFiLjhKfeO0EwffRqJA6GM8FxJDf0';

// ================================================================
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ===== AUTH =====
const showLogin  = () => document.getElementById('login-screen').classList.remove('hidden');
const hideLogin  = () => document.getElementById('login-screen').classList.add('hidden');

const doLogin = async e => {
  e.preventDefault();
  const btn=document.getElementById('login-btn'), err=document.getElementById('login-err');
  btn.textContent='Memuat...'; btn.disabled=true; err.classList.add('hidden');
  const {error} = await sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-pass').value
  });
  btn.textContent='Masuk'; btn.disabled=false;
  if(error){ err.textContent=error.message==='Invalid login credentials'?'Email atau password salah.':error.message; err.classList.remove('hidden'); return; }
};

const doLogout = async () => {
  if(!confirm('Keluar dari aplikasi?')) return;
  await sb.auth.signOut();
};

sb.auth.onAuthStateChange((event, session) => {
  if(session?.user){
    hideLogin();
    S.currentUser = session.user.email || '';
    S.isAdmin = false;
    document.getElementById('nav-user').textContent = S.currentUser;
    document.querySelectorAll('.admin-only').forEach(el=>el.classList.add('hidden'));
    loadAll();
  } else {
    showLogin();
    S.currentUser = ''; S.isAdmin = false;
    document.getElementById('nav-user').textContent = '';
  }
});

// ===== STATE =====
let S = { page:'dashboard', mk:[], spk:[], pr:[], sa:[], sspk:[], dc:[], tvm:[], users:[], fy:'', fm:'', fkontrak:'', dcTab:'dc', prTab:'missing', saTab:'missing', tvmTab:'hhe', currentUser:'', currentNama:'', isAdmin:false };

// ===== UTILS =====
const uid = () => (crypto.randomUUID ? crypto.randomUUID() : 'x'+Math.random().toString(36).slice(2,10)+Date.now().toString(36));
const rpN = v => +String(v||'').replace(/[^\d.-]/g,'') || 0;
const rp  = v => v!=null&&v!=='' ? 'Rp '+rpN(v).toLocaleString('id-ID') : '-';
const df  = d => { if(!d) return '-'; const p=String(d).split('-'); return p.length===3&&p[0].length===4?`${p[2]}/${p[1]}/${p[0]}`:d; };
const daysLeft = d => { if(!d) return null; return Math.ceil((new Date(d)-new Date())/86400000); };
const sisaHari = d => {
  const n=daysLeft(d); if(n===null) return '-';
  if(n<0)   return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">⚠ Expired ${Math.abs(n)}h</span>`;
  if(n<=30)  return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-red-100 text-red-700">🔴 ${n} hari</span>`;
  if(n<=100) return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700">⚠ ${n} hari</span>`;
  return `<span class="text-xs text-gray-400">${n} hari</span>`;
};
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const dn  = v => v||null;
const genCustomID = (prefix, arr, field='customID') => {
  const yy = String(new Date().getFullYear()).slice(-2);
  const pat = new RegExp(`^${prefix}-${yy}-(\\d+)$`);
  const max = arr.reduce((m,x) => { const n=((x[field]||'').match(pat)||[])[1]; return n?Math.max(m,+n):m; }, 0);
  return `${prefix}-${yy}-${String(max+1).padStart(3,'0')}`;
};

const BC = {
  'Aktif':'bg-sky-100 text-sky-700','Closed':'bg-gray-100 text-gray-600','Selesai':'bg-emerald-100 text-emerald-700',
  'Open':'bg-sky-100 text-sky-700','In Progress':'bg-amber-100 text-amber-700','Terminasi':'bg-red-100 text-red-600',
  'Ditagih':'bg-indigo-100 text-indigo-700','Lunas':'bg-emerald-100 text-emerald-700',
  // Direct Charge flow
  'Pengajuan':'bg-slate-100 text-slate-600',
  'Proses Planner':'bg-yellow-100 text-yellow-700',
  'Proses AstmenRAM':'bg-orange-100 text-orange-700',
  'Proses Senior Manager':'bg-orange-200 text-orange-800',
  'Proses SCM':'bg-blue-100 text-blue-700',
  'PO Terbit':'bg-indigo-100 text-indigo-700',
  'Diterima':'bg-emerald-100 text-emerald-700',
  'Ditolak':'bg-red-100 text-red-600',
  // Reservasi flow
  'MR Dibuat':'bg-yellow-100 text-yellow-700',
  'Reservasi Dibuat':'bg-blue-100 text-blue-700',
};
const badge = s => `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${BC[s]||'bg-gray-100 text-gray-500'}">${esc(s||'-')}</span>`;

// ===== LOADING =====
const setLoad = (on, msg='Memuat...') => {
  document.getElementById('loading').classList.toggle('hidden',!on);
  document.getElementById('load-msg').textContent = msg;
};
const dbErr = err => { if(err){alert('Error: '+err.message);return true;} return false; };

// ===== DB CONVERTERS (snake_case ↔ camelCase) =====
const F = {
  // Supabase → JS
  from: {
    spk:  r => ({id:r.id,noSPK:r.no_spk,tanggal:r.tanggal,vendor:r.vendor,uraian:r.uraian,nilaiKontrak:r.nilai_kontrak,realisasi:r.realisasi,progress:r.progress,status:r.status,keterangan:r.keterangan,createdBy:r.created_by,updatedBy:r.updated_by}),
    dc:   r => ({id:r.id,jenis:r.jenis||'Direct Charge',noPerm:r.no_perm,tanggal:r.tanggal,namaPart:r.nama_part,jumlah:r.jumlah,satuan:r.satuan,hargaSatuan:r.harga_satuan,total:r.total,kimap:r.kimap,nomorPR:r.nomor_pr,nomorPO:r.nomor_po,nomorMemo:r.nomor_memo,nomorMR:r.nomor_mr,nomorReservasi:r.nomor_reservasi,nomorGR:r.nomor_gr,tglGR:r.tgl_gr,diambilOleh:r.diambil_oleh,status:r.status,keterangan:r.keterangan,items:r.items||[],createdBy:r.created_by,updatedBy:r.updated_by}),
    mk:   r => ({id:r.id,customID:r.custom_id,nomorSPB:r.nomor_spb,vendor:r.vendor,judulKontrak:r.judul_kontrak,nilaiKontrak:r.nilai_kontrak,tglMulai:r.tgl_mulai,tglBerakhir:r.tgl_berakhir,pic:r.pic,status:r.status,createdBy:r.created_by,updatedBy:r.updated_by}),
    coo:  r => ({id:r.id,idKontrak:r.id_kontrak,customID:r.custom_id,nomorSPK:r.nomor_spk,deskripsi:r.deskripsi,nilaiSPK:r.nilai_spk,tglTerbit:r.tgl_terbit,tglMulai:r.tgl_mulai,tglSelesai:r.tgl_selesai,status:r.status,catatan:r.catatan,createdBy:r.created_by,updatedBy:r.updated_by}),
    pr:   r => ({id:r.id,idCoO:r.id_coo,customID:r.custom_id,nomorPR:r.nomor_pr,tglPR:r.tgl_pr,deskripsi:r.deskripsi,estimasiNilai:r.estimasi_nilai,catatan:r.catatan,createdBy:r.created_by,updatedBy:r.updated_by}),
    sa:   r => ({id:r.id,idCoO:r.id_coo,customID:r.custom_id,nomorSA:r.nomor_sa,tglSA:r.tgl_sa,deskripsi:r.deskripsi,nilaiSA:r.nilai_sa,nomorInvoice:r.nomor_invoice,catatan:r.catatan,createdBy:r.created_by,updatedBy:r.updated_by}),
    tvm:  r => ({id:r.id,nomorCOO:r.nomor_coo,tanggal:r.tanggal,fungsi:r.fungsi||'Hoist & Heavy Equipment',deskripsi:r.deskripsi,nilai:r.nilai,tglMulai:r.tgl_mulai,tglSelesai:r.tgl_selesai,status:r.status,catatan:r.catatan,createdBy:r.created_by,updatedBy:r.updated_by}),
  },
  // JS → Supabase
  to: {
    spk:  o => ({id:o.id,no_spk:o.noSPK,tanggal:dn(o.tanggal),vendor:o.vendor,uraian:o.uraian,nilai_kontrak:rpN(o.nilaiKontrak),realisasi:rpN(o.realisasi),progress:+o.progress||0,status:o.status,keterangan:o.keterangan,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    dc:   o => ({id:o.id,jenis:o.jenis||'Direct Charge',no_perm:o.noPerm,tanggal:dn(o.tanggal),nama_part:o.namaPart,jumlah:rpN(o.jumlah),satuan:o.satuan,harga_satuan:rpN(o.hargaSatuan),total:rpN(o.total),kimap:o.kimap||null,nomor_pr:o.nomorPR||null,nomor_po:o.nomorPO||null,nomor_memo:o.nomorMemo||null,nomor_mr:o.nomorMR||null,nomor_reservasi:o.nomorReservasi||null,nomor_gr:o.nomorGR||null,tgl_gr:dn(o.tglGR),diambil_oleh:o.diambilOleh||null,status:o.status,keterangan:o.keterangan,items:o.items||[],created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    mk:   o => ({id:o.id,custom_id:o.customID,nomor_spb:o.nomorSPB,vendor:o.vendor,judul_kontrak:o.judulKontrak,nilai_kontrak:rpN(o.nilaiKontrak),tgl_mulai:dn(o.tglMulai),tgl_berakhir:dn(o.tglBerakhir),pic:o.pic,status:o.status,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    coo:  o => ({id:o.id,id_kontrak:o.idKontrak,custom_id:o.customID,nomor_spk:o.nomorSPK,deskripsi:o.deskripsi,nilai_spk:rpN(o.nilaiSPK),tgl_terbit:dn(o.tglTerbit),tgl_mulai:dn(o.tglMulai),tgl_selesai:dn(o.tglSelesai),status:o.status,catatan:o.catatan,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    pr:   o => ({id:o.id,id_coo:o.idCoO,custom_id:o.customID,nomor_pr:o.nomorPR,tgl_pr:dn(o.tglPR),deskripsi:o.deskripsi,estimasi_nilai:rpN(o.estimasiNilai),catatan:o.catatan,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    sa:   o => ({id:o.id,id_coo:o.idCoO,custom_id:o.customID,nomor_sa:o.nomorSA,tgl_sa:dn(o.tglSA),deskripsi:o.deskripsi,nilai_sa:rpN(o.nilaiSA),nomor_invoice:o.nomorInvoice,catatan:o.catatan,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
    tvm:  o => ({id:o.id,nomor_coo:o.nomorCOO,tanggal:dn(o.tanggal),fungsi:o.fungsi,deskripsi:o.deskripsi,nilai:rpN(o.nilai),tgl_mulai:dn(o.tglMulai),tgl_selesai:dn(o.tglSelesai),status:o.status,catatan:o.catatan,created_by:o.createdBy||null,updated_by:o.updatedBy||null}),
  }
};

// ===== LOAD ALL DATA =====
const loadAll = async () => {
  setLoad(true,'Memuat data dari Supabase...');
  const [r1,r2,r3,r4,r5,r6,r7,r8] = await Promise.all([
    sb.from('spk').select('*').order('tanggal',{ascending:false}),
    sb.from('direct_charge').select('*').order('tanggal',{ascending:false}),
    sb.from('master_kontrak').select('*').order('custom_id'),
    sb.from('coo_spk').select('*').order('tgl_terbit',{ascending:false}),
    sb.from('purchase_request').select('*').order('tgl_pr',{ascending:false}),
    sb.from('penagihan_sa').select('*').order('tgl_sa',{ascending:false}),
    sb.from('user_profiles').select('*').order('email'),
    sb.from('tvm_coo').select('*').order('tanggal',{ascending:false}),
  ]);
  S.sspk  = (r1.data||[]).map(F.from.spk);
  S.dc    = (r2.data||[]).map(F.from.dc);
  S.mk    = (r3.data||[]).map(F.from.mk);
  S.spk   = (r4.data||[]).map(F.from.coo);
  S.pr    = (r5.data||[]).map(F.from.pr);
  S.sa    = (r6.data||[]).map(F.from.sa);
  S.users = (r7.data||[]);
  S.tvm   = (r8.data||[]).map(F.from.tvm);
  const myProfile = S.users.find(u=>u.email===S.currentUser);
  S.currentNama = myProfile?.nama || '';
  S.isAdmin = myProfile?.role === 'admin';
  document.getElementById('nav-user').textContent = S.currentNama || S.currentUser;
  document.querySelectorAll('.admin-only').forEach(el=>el.classList.toggle('hidden',!S.isAdmin));
  setLoad(false);
  render();
};

// ===== FILTERS =====
const byDate = (arr,f) => arr.filter(x => {
  const v=x[f]; if(!v) return true;
  if(S.fy && !String(v).startsWith(S.fy)) return false;
  if(S.fm && String(v).substring(5,7) !== S.fm.padStart(2,'0')) return false;
  return true;
});
const byK = arr => {
  if(!S.fkontrak) return arr;
  const ids = S.spk.filter(x=>x.idKontrak===S.fkontrak).map(x=>x.id);
  return arr.filter(x=>ids.includes(x.idCoO));
};

// ===== FILTER BAR =====
const fBar = (showK=false) => `
  <div class="flex flex-wrap gap-2 items-center">
    <select onchange="S.fy=this.value;render()" class="border rounded-lg px-3 py-1.5 text-sm bg-white">
      <option value="">Semua Tahun</option>
      ${[2023,2024,2025,2026,2027,2028,2029].map(y=>`<option value="${y}" ${S.fy==y?'selected':''}>${y}</option>`).join('')}
    </select>
    <select onchange="S.fm=this.value;render()" class="border rounded-lg px-3 py-1.5 text-sm bg-white">
      <option value="">Semua Bulan</option>
      ${['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'].map((m,i)=>
        `<option value="${String(i+1).padStart(2,'0')}" ${S.fm===String(i+1).padStart(2,'0')?'selected':''}>${m}</option>`).join('')}
    </select>

const go = page => {
  S.page=page;
  document.querySelectorAll('.nav-item').forEach(el=>{

const render = () => {

const emptyRow = (icon,msg,n) => `<tr><td colspan="${n}" class="py-14 text-center text-gray-400"><div class="text-3xl mb-2">${icon}</div>${msg}</td></tr>`;
const shortU = e => e ? e.split('@')[0] : '';
const byLine = r => {
  if(!r.createdBy && !r.updatedBy) return '';
  const c = r.createdBy ? `<span title="${esc(r.createdBy)}">📥 ${esc(shortU(r.createdBy))}</span>` : '';
  const u = (r.updatedBy && r.updatedBy!==r.createdBy) ? `<span title="${esc(r.updatedBy)}"> ✏️ ${esc(shortU(r.updatedBy))}</span>` : '';
  return `<div class="text-[10px] text-gray-400 mt-1.5 leading-tight">${c}${u}</div>`;
};

const dcItemsSectionInner = () => {
  const isRes = _dcIsRes;
  const total = _dcItems.reduce((a,x)=>a+(+x.jumlah||0)*(+x.hargaSatuan||0),0);
  return `
    <div class="flex items-center justify-between mb-1.5">
      <label class="text-xs font-medium text-gray-600">Item Part / Material <span class="text-red-400">*</span></label>
      <button type="button" onclick="dcAddItem()" class="text-xs text-blue-600 hover:underline font-medium">+ Tambah Baris</button>
    </div>
    <div class="border rounded-lg overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-xs">
          <thead class="bg-gray-50 text-gray-500 border-b">
            <tr>
              <th class="px-2 py-2 text-left">Nama Part / Material</th>
              <th class="px-2 py-2 text-center w-14">Jml</th>
              <th class="px-2 py-2 text-left w-14">Satuan</th>
              <th class="px-2 py-2 text-left w-20">KIMAP</th>
              ${!isRes?'<th class="px-2 py-2 text-right">Harga Sat. (Rp)</th><th class="px-2 py-2 text-right w-24">Total</th>':''}
              <th class="px-2 py-2 w-6"></th>
            </tr>
          </thead>
          <tbody id="dc-items-body">
            ${_dcItems.map(item=>dcItemRow(item)).join('')}
          </tbody>
          ${!isRes?`<tfoot class="bg-gray-50 border-t"><tr>
            <td colspan="4" class="px-2 py-1.5 text-right text-gray-500 font-semibold">TOTAL</td>
            <td></td>
            <td class="px-2 py-1.5 text-right font-mono font-semibold whitespace-nowrap" id="dc-grand-total">${rp(total)}</td>
            <td></td>
          </tr></tfoot>`:''}
        </table>
      </div>
    </div>`;
};

const dcSyncFromDOM = () => {
  const rows = document.querySelectorAll('#dc-items-body tr');
  _dcItems = [...rows].map(r => ({
    namaPart: r.querySelector('[data-f=namaPart]')?.value?.trim()||'',
    jumlah: +(r.querySelector('[data-f=jumlah]')?.value||1),
    satuan: r.querySelector('[data-f=satuan]')?.value?.trim()||'pcs',
    kimap: r.querySelector('[data-f=kimap]')?.value?.trim()||'',
    hargaSatuan: +(r.querySelector('[data-f=hargaSatuan]')?.value||0)
  }));
};

const dcRenderItems = () => {
  const body = document.getElementById('dc-items-body');
  if(body) body.innerHTML = _dcItems.map(item=>dcItemRow(item)).join('');
  dcUpdateGrand();
};

const dcAddItem = () => {
  dcSyncFromDOM();
  _dcItems.push({namaPart:'',jumlah:1,satuan:'pcs',kimap:'',hargaSatuan:0});
  dcRenderItems();
  document.querySelector('#dc-items-body tr:last-child [data-f=namaPart]')?.focus();
};

const dcRemoveItem = btn => {
  dcSyncFromDOM();
  const row = btn.closest('tr');
  const idx = [...document.querySelectorAll('#dc-items-body tr')].indexOf(row);
  if(idx>=0) _dcItems.splice(idx,1);
  if(!_dcItems.length) _dcItems.push({namaPart:'',jumlah:1,satuan:'pcs',kimap:'',hargaSatuan:0});
  dcRenderItems();
};

const dcUpdateGrand = () => {
  if(_dcIsRes) return;
  let grand=0;
  document.querySelectorAll('#dc-items-body tr').forEach(r=>{
    const jml=+(r.querySelector('[data-f=jumlah]')?.value||0);
    const hrg=+(r.querySelector('[data-f=hargaSatuan]')?.value||0);
    const totCell=r.querySelector('.dc-row-total');
    if(totCell) totCell.textContent=rp(jml*hrg);
    grand+=jml*hrg;
  });
  const gt=document.getElementById('dc-grand-total');
  if(gt) gt.textContent=rp(grand);
};

const getDCItemsFromDOM = () => {
  return [...document.querySelectorAll('#dc-items-body tr')].map(r=>({
    namaPart: r.querySelector('[data-f=namaPart]')?.value?.trim()||'',
    jumlah: +(r.querySelector('[data-f=jumlah]')?.value||1),
    satuan: r.querySelector('[data-f=satuan]')?.value?.trim()||'pcs',
    kimap: r.querySelector('[data-f=kimap]')?.value?.trim()||'',
    hargaSatuan: +(r.querySelector('[data-f=hargaSatuan]')?.value||0),
    total: (+(r.querySelector('[data-f=jumlah]')?.value||1))*(+(r.querySelector('[data-f=hargaSatuan]')?.value||0))
  }));
};

const svUser = async (e,id) => {
  e.preventDefault(); const f=e.target;
  const nama=f.nama.value.trim();
  const role=f.role.value;
  if(id){
    // Edit: hanya update nama & role di profil
    const {error}=await sb.from('user_profiles').update({nama,role}).eq('id',id);
    if(dbErr(error)) return;
    const i=S.users.findIndex(x=>x.id===id);
    if(i>=0) S.users[i]={...S.users[i],nama,role};
    closeModal(); render();
  } else {
    // Tambah baru: buat akun Auth dulu via temp client (agar sesi admin tidak terganti)
    const email=f.email.value.trim().toLowerCase();
    const password=f.password.value;
    setLoad(true,'Membuat akun...');
    const tmpSb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { storageKey: 'rekap-tmp-auth', persistSession: false, autoRefreshToken: false }
    });
    const {data, error:authErr} = await tmpSb.auth.signUp({email, password});
    if(authErr){ setLoad(false); alert('Gagal buat akun:\n'+authErr.message); return; }
    // Daftarkan profil (gunakan UUID dari Auth, atau generate sendiri jika belum confirm)
    const userId = data?.user?.id;
    if(!userId){ setLoad(false); alert('Akun berhasil dibuat. Pengguna perlu konfirmasi email sebelum profil terdaftar otomatis.\nPastikan trigger Supabase sudah aktif.'); closeModal(); return; }
    const {error:profErr} = await sb.from('user_profiles').upsert({id:userId, email, nama, role});
    setLoad(false);
    if(profErr){ alert('Akun berhasil dibuat tapi profil gagal disimpan:\n'+profErr.message); closeModal(); return; }
    S.users.push({id:userId, email, nama, role});
    S.users.sort((a,b)=>a.email.localeCompare(b.email));
    closeModal(); render();
    alert(`Akun berhasil dibuat!\n\nEmail: ${email}\n\nJika konfirmasi email aktif, pengguna perlu klik link di email mereka sebelum bisa login.`);
  }
};

// ===== IMPORT EXCEL → SUPABASE =====
const importExcel = input => {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload = async e => {
    try {
      const wb=XLSX.read(e.target.result,{type:'array'});
      const rdSheet=(name,map)=>{
        const ws=wb.Sheets[name]; if(!ws) return [];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(!rows.length) return [];
        const head=rows[0].map(h=>String(h||'').trim());
        return rows.slice(1).filter(r=>r.some(v=>v!=null&&v!=='')).map(r=>{
          const o={};
          map.forEach(([from,to])=>{ const i=head.indexOf(from); o[to]=i>=0?String(r[i]||'').replace(/_x000d_\n/g,'\n').trim():''; });
          return o;
        });
      };
      const sspk=rdSheet('SPK',[['LocalID','id'],['NoSPK','noSPK'],['Tanggal','tanggal'],['Vendor','vendor'],['Uraian','uraian'],['NilaiKontrak','nilaiKontrak'],['Realisasi','realisasi'],['Progress','progress'],['Status','status'],['Keterangan','keterangan']]);
      const dc  =rdSheet('Permintaan Part',[['LocalID','id'],['Jenis','jenis'],['NoPerm','noPerm'],['Tanggal','tanggal'],['NamaPart','namaPart'],['Jumlah','jumlah'],['Satuan','satuan'],['HargaSatuan','hargaSatuan'],['Total','total'],['KIMAP','kimap'],['NomorPR','nomorPR'],['NomorPO','nomorPO'],['NomorMemo','nomorMemo'],['NomorMR','nomorMR'],['NomorReservasi','nomorReservasi'],['NomorGR','nomorGR'],['TglGR','tglGR'],['DiambilOleh','diambilOleh'],['Status','status'],['Keterangan','keterangan']]);
      const mk  =rdSheet('Master Kontrak',[['LocalID','id'],['CustomID','customID'],['NomorSPB','nomorSPB'],['Vendor','vendor'],['JudulKontrak','judulKontrak'],['NilaiKontrak','nilaiKontrak'],['TglMulai','tglMulai'],['TglBerakhir','tglBerakhir'],['PIC','pic'],['Status','status']]);
      const spk =rdSheet('CoO SPK',[['LocalID','id'],['IDKontrak','idKontrak'],['CustomID','customID'],['NomorSPK','nomorSPK'],['Deskripsi','deskripsi'],['NilaiSPK','nilaiSPK'],['TglTerbit','tglTerbit'],['TglMulai','tglMulai'],['TglSelesai','tglSelesai'],['Status','status'],['Catatan','catatan']]);
      const pr  =rdSheet('Purchase Request',[['LocalID','id'],['IDCoO','idCoO'],['CustomID','customID'],['NomorPR','nomorPR'],['TglPR','tglPR'],['Deskripsi','deskripsi'],['EstimasiNilai','estimasiNilai'],['Catatan','catatan']]);
      const sa  =rdSheet('Penagihan SA',[['LocalID','id'],['IDCoO','idCoO'],['CustomID','customID'],['NomorSA','nomorSA'],['TglSA','tglSA'],['Deskripsi','deskripsi'],['NilaiSA','nilaiSA'],['NomorInvoice','nomorInvoice'],['Catatan','catatan']]);

      const total=sspk.length+dc.length+mk.length+spk.length+pr.length+sa.length;
      if(!total){alert('Tidak ada data terbaca.\nPastikan nama sheet: SPK, Permintaan Part, Master Kontrak, CoO SPK, Purchase Request, Penagihan SA');return;}

      if(!confirm(`Data ditemukan:\n• ${sspk.length} SPK\n• ${dc.length} Permintaan Part\n• ${mk.length} Master Kontrak\n• ${spk.length} CoO SPK\n• ${pr.length} Purchase Request\n• ${sa.length} Penagihan SA\n\nUpload ke Supabase? (Data lama akan di-replace)`)) return;

      setLoad(true,'Mengupload ke Supabase...');
      const ups = async (table, rows, conv) => {
        if(!rows.length) return;
        const {error}=await sb.from(table).upsert(rows.map(conv));
        if(error) throw error;
      };
      // urutan penting: parent dulu sebelum child
      await ups('spk',sspk,F.to.spk);
      await ups('direct_charge',dc,F.to.dc);
      await ups('master_kontrak',mk,F.to.mk);
      await ups('coo_spk',spk,F.to.coo);
      await ups('purchase_request',pr,F.to.pr);
      await ups('penagihan_sa',sa,F.to.sa);

      await loadAll();
      alert(`Import berhasil! ${total} data diupload ke Supabase.`);
    } catch(err){ setLoad(false); alert('Gagal import:\n'+err.message); }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
};

// ===== REFRESH / PERBARUI DATA =====
const doRefresh = () => window.location.reload();

document.getElementById('modal-overlay').addEventListener('click', e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-box').addEventListener('change', e=>{
  if(e.target.name==='jenis') dcToggleFields(e.target.value);
});
go('dashboard');
</script>
